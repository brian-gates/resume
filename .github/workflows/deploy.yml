name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: self-hosted
    env:
      N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
      NEXT_PUBLIC_ENABLE_CHAT: 'true'

    steps:
      - name: Get Environment
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "Current branch: $BRANCH"
          if [ "$BRANCH" = "main" ]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          fi
          echo "Will deploy to $DEPLOY_ENV environment"
          echo "Job started at $(date)"

      - name: Clone or update repository
        run: |
          REPO_DIR=$HOME/repo-$DEPLOY_ENV
          if [ -d "$REPO_DIR" ]; then
            echo "Updating existing repository in $REPO_DIR"
            cd $REPO_DIR
            git fetch --prune origin
            git checkout $GITHUB_REF_NAME || git checkout staging
            git reset --hard HEAD
            git clean -fd
            git pull
          else
            echo "Cloning repository to $REPO_DIR"
            git clone https://github.com/brian-gates/resume.git $REPO_DIR
            cd $REPO_DIR
            git checkout $GITHUB_REF_NAME || git checkout staging
          fi
          echo "Using commit: $(git rev-parse HEAD)"

      - name: Setup prerequisites
        run: |
          # Add debug output
          echo "HOME directory: $HOME"
          echo "Current directory: $(pwd)"

          # Load NVM
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # This loads nvm bash_completion

          # Debug versions
          echo "Node version before: $(node --version 2>/dev/null || echo 'not found')"
          echo "NVM version: $(nvm --version 2>/dev/null || echo 'not found')"

          # Install Node.js
          nvm install 20
          nvm use 20

          # Verify installations
          echo "Node version after: $(node --version)"
          echo "NPM version: $(npm --version)"

          # Install pnpm
          npm install -g pnpm
          echo "PNPM version: $(pnpm --version)"

      - name: Install dependencies
        run: |
          # Add debug output
          echo "Current directory: $(pwd)"

          # Load NVM and node
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 20

          cd $HOME/repo-$DEPLOY_ENV
          echo "Node version: $(node --version)"
          echo "Running pnpm install..."
          pnpm i --no-frozen-lockfile

      - name: Build application
        run: |
          # Load NVM and node
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 20

          cd $HOME/repo-$DEPLOY_ENV
          echo "Building application..."
          pnpm build
          echo "Build completed."

      - name: Install PM2 if needed
        run: |
          # Load NVM and node
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 20

          # Install PM2 globally if not already available
          echo "Checking for PM2..."
          if ! command -v pm2 &> /dev/null; then
            echo "Installing PM2 globally..."
            npm install -g pm2
          fi
          echo "PM2 version: $(pm2 --version)"

      - name: Create PM2 config and deploy
        run: |
          # Load NVM and node
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 20

          cd $HOME/repo-$DEPLOY_ENV

          if [ "$DEPLOY_ENV" = "staging" ]; then
            echo "Deploying to STAGING on port 3001"
            PM2_APP_NAME="briangates-website-staging"
            PM2_PORT=3001
          else
            echo "Deploying to PRODUCTION on port 3000"
            PM2_APP_NAME="briangates-website-production"
            PM2_PORT=3000
          fi

          # Generate the PM2 config: cluster mode + 2 instances so `pm2 reload`
          # can swap workers one at a time with no down window. watch:false so
          # the running app is never bounced by build output.
          node -e "
            const fs = require('fs');
            const config = {
              apps: [{
                name: '${PM2_APP_NAME}',
                script: 'server.js',
                instances: 2,
                exec_mode: 'cluster',
                wait_ready: true,
                listen_timeout: 10000,
                kill_timeout: 5000,
                autorestart: true,
                watch: false,
                max_memory_restart: '1G',
                env: {
                  NODE_ENV: 'production',
                  PORT: ${PM2_PORT},
                  N8N_WEBHOOK_URL: process.env.N8N_WEBHOOK_URL,
                  NEXT_PUBLIC_ENABLE_CHAT: process.env.NEXT_PUBLIC_ENABLE_CHAT
                }
              }]
            };
            fs.writeFileSync('ecosystem.config.js', 'module.exports = ' + JSON.stringify(config, null, 2) + ';');
          "

          # Deploy strategy:
          #  - Not running yet            -> cold start.
          #  - Running in cluster mode    -> rolling `pm2 reload` (zero-downtime;
          #    waits for each new worker's `ready` signal before killing the old).
          #  - Running in fork mode       -> one-time cutover: delete + start, since
          #    `pm2 reload` cannot change a running app's exec_mode (fork->cluster).
          if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
            # `pm2 jlist` can prepend warning banners and ANSI color codes to
            # stdout (e.g. "In-memory PM2 is out-of-date"), so strip ANSI and
            # slice from the first '[' before parsing. Never throws -> always
            # yields a value so `set -e` can't abort the step here.
            EXEC_MODE=$(pm2 jlist 2>/dev/null | node -e "
              let s = require('fs').readFileSync(0, 'utf8').replace(/\x1b\[[0-9;]*[A-Za-z]/g, '');
              let mode = '';
              try {
                const apps = JSON.parse(s.slice(s.indexOf('[')));
                const app = apps.find(a => a.name === '$PM2_APP_NAME');
                if (app && app.pm2_env) mode = app.pm2_env.exec_mode || '';
              } catch (e) {}
              process.stdout.write(mode);
            ")
            echo "Current exec_mode for $PM2_APP_NAME: ${EXEC_MODE:-unknown}"
            if [ "$EXEC_MODE" = "cluster_mode" ]; then
              echo "Reloading $PM2_APP_NAME (zero-downtime rolling restart)"
              pm2 reload ecosystem.config.js
            else
              echo "One-time cutover to cluster mode (brief blip): delete + start"
              pm2 delete "$PM2_APP_NAME"
              pm2 start ecosystem.config.js
            fi
          else
            echo "Starting $PM2_APP_NAME for the first time"
            pm2 start ecosystem.config.js
          fi

          echo "Deployment complete to $DEPLOY_ENV environment at $(date)"

      - name: Health check
        run: |
          if [ "$DEPLOY_ENV" = "staging" ]; then PM2_PORT=3001; else PM2_PORT=3000; fi
          echo "Waiting for http://localhost:$PM2_PORT/healthz to report healthy..."
          for i in $(seq 1 15); do
            if curl -fsS "http://localhost:$PM2_PORT/healthz" > /dev/null; then
              echo "Healthy after ${i}s."
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed: /healthz never returned 200 on port $PM2_PORT"
          exit 1
